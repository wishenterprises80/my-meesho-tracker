<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Meesho Tracker - Safe & Secure</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { color: #811e68; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #811e68; padding-bottom: 10px; }
        .upload-section { display: flex; justify-content: center; margin-bottom: 20px; background: #fff5fd; padding: 25px; border-radius: 10px; border: 1px solid #eecce6; }
        .btn-group { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.3s; color: white; }
        .export-btn { background: #2ecc71; }
        .backup-btn { background: #3498db; }
        .restore-btn { background: #9b59b6; }
        .clear-btn { background: #ff4757; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        th { background: #811e68; color: white; position: sticky; top: 0; }
        .total-row { background: #2d3436; color: white; font-weight: bold; font-size: 16px; }
        .input-charge { width: 100px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }
        .profit { color: #27ae60; font-weight: bold; }
        .loss { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Meesho Business Tracker (Secure Backup)</h2>

    <div class="upload-section">
        <div style="text-align: center;">
            <strong>Step 1: Upload Orders CSV</strong><br><br>
            <input type="file" id="orderFile" accept=".csv, .xlsx">
        </div>
    </div>

    <div class="btn-group">
        <button class="export-btn" onclick="exportToExcel()">Excel Download</button>
        <button class="backup-btn" onclick="backupData()">Save Backup to HDD</button>
        <button class="restore-btn" onclick="document.getElementById('restoreInput').click()">Restore from HDD</button>
        <input type="file" id="restoreInput" style="display:none" accept=".json" onchange="restoreData(this)">
        <button class="clear-btn" onclick="clearAllData()">Format/Clear All</button>
    </div>

    <table id="masterTable">
        <thead>
            <tr>
                <th>S.No.</th>
                <th>Sub Order No</th>
                <th>Order Date</th>
                <th>SKU</th>
                <th>Supplier Disc. Price</th>
                <th>Return Charge (Manual)</th>
                <th>Net Amount</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr class="total-row" id="totalRow"></tr>
        </tfoot>
    </table>
</div>

<script>
    let masterData = JSON.parse(localStorage.getItem('meeshoData')) || {};
    window.onload = renderTable;

    document.getElementById('orderFile').addEventListener('change', (e) => processFile(e.target.files[0]));

    function excelDateToJSDate(serial) {
        if(!serial || isNaN(serial)) return serial;
        let date = new Date(Math.round((serial - 25569) * 86400 * 1000));
        return date.toLocaleDateString('en-GB');
    }

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            json.forEach(row => {
                let keys = Object.keys(row);
                let oidKey = keys.find(k => k.toLowerCase().includes('sub order no') || k.toLowerCase().includes('sub-order id') || k.toLowerCase().includes('order id'));
                let priceKey = keys.find(k => k.toLowerCase().includes('supplier discounted price'));
                let dateKey = keys.find(k => k.toLowerCase().includes('order date'));
                let skuKey = keys.find(k => k.toLowerCase().includes('sku'));

                let oid = row[oidKey];
                if (!oid) return;

                if (!masterData[oid]) {
                    masterData[oid] = { id: oid, date: '-', sku: '-', price: 0, charge: 0 };
                }

                let rawDate = row[dateKey] || '-';
                masterData[oid].date = (typeof rawDate === 'number') ? excelDateToJSDate(rawDate) : rawDate;
                masterData[oid].sku = row[skuKey] || '-';
                masterData[oid].price = parseFloat(row[priceKey] || 0);
            });
            saveAndRefresh();
        };
        reader.readAsArrayBuffer(file);
    }

    function updateCharge(id, val) {
        masterData[id].charge = parseFloat(val || 0);
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('meeshoData', JSON.stringify(masterData));
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let count = 1;
        let grandTotalNet = 0;
        let entries = Object.values(masterData).reverse();

        entries.forEach(item => {
            let net = item.price - item.charge;
            grandTotalNet += net;

            const tr = document.createElement('tr');
            let amountClass = net > 0 ? 'profit' : (net < 0 ? 'loss' : '');

            tr.innerHTML = `
                <td>${count++}</td>
                <td>${item.id}</td>
                <td>${item.date}</td>
                <td>${item.sku}</td>
                <td>₹${item.price.toFixed(2)}</td>
                <td><input type="number" class="input-charge" value="${item.charge}" onchange="updateCharge('${item.id}', this.value)"></td>
                <td class="${amountClass}">₹${net.toFixed(2)}</td>
            `;
            tbody.appendChild(tr);
        });

        const totalRow = document.getElementById('totalRow');
        totalRow.innerHTML = `
            <td colspan="4">GRAND TOTAL (${entries.length} Items)</td>
            <td style="text-align:right">Total Profit/Loss:</td>
            <td colspan="2" style="color: ${grandTotalNet >= 0 ? '#2ecc71' : '#ff4757'}">₹${grandTotalNet.toFixed(2)}</td>
        `;
    }

    // --- NEW BACKUP FUNCTIONS ---
    function backupData() {
        if (Object.keys(masterData).length === 0) {
            alert("Backup lene ke liye koi data hi nahi hai!");
            return;
        }
        const dataStr = JSON.stringify(masterData);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        
        const exportFileDefaultName = 'Meesho_Backup_' + new Date().toLocaleDateString().replace(/\//g, '-') + '.json';
        
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
    }

    function restoreData(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const restored = JSON.parse(e.target.result);
                if (confirm("Purana data restore karein? Isse abhi wala data badal jayega.")) {
                    masterData = restored;
                    saveAndRefresh();
                    alert("Data Restore Successful!");
                }
            } catch (err) {
                alert("Galat file select kari hai!");
            }
        };
        reader.readAsText(file);
    }

    function clearAllData() {
        if(confirm("Confirm: Kya aap saara data delete karna chahte hain? Pehle backup le lein!")) {
            localStorage.removeItem('meeshoData');
            masterData = {};
            renderTable();
        }
    }

    function exportToExcel() {
        const wsData = Object.values(masterData).map((item, index) => ({
            "S.No": index + 1,
            "Sub Order No": item.id,
            "Date": item.date,
            "SKU": item.sku,
            "Supplier Price": item.price,
            "Return Charge": item.charge,
            "Net": item.price - item.charge
        }));
        const ws = XLSX.utils.json_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Report");
        XLSX.writeFile(wb, "Meesho_Business_Report.xlsx");
    }
</script>

</body>
</html>
